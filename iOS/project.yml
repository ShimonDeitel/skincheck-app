name: SkinCheck
options:
  bundleIdPrefix: com.shimondeitel.skincheck
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  SkinCheck:
    type: application
    platform: iOS
    sources:
      - path: SkinCheck
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.skincheck
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: SkinCheck/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  SkinCheckTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SkinCheckTests
      - path: SkinCheck.storekit
    dependencies:
      - target: SkinCheck
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.skincheck.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  SkinCheckUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: SkinCheckUITests
    dependencies:
      - target: SkinCheck
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.skincheck.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  SkinCheck:
    build:
      targets:
        SkinCheck: all
        SkinCheckTests: [test]
        SkinCheckUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: SkinCheck.storekit
    test:
      config: Debug
      storeKitConfiguration: SkinCheck.storekit
      targets:
        - SkinCheckTests
        - SkinCheckUITests
    archive:
      config: Release
